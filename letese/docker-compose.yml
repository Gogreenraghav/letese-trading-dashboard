# LETESE● Local Development Stack
# docker-compose.yml — PostgreSQL, Redis, Kafka, Kafka UI, API, AIPOTs
version: '3.9'

services:
  # ── Database ────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: letese_user
      POSTGRES_PASSWORD: letese_pass
      POSTGRES_DB: letese_prod
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./app/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./scripts/init_pgvector.sql:/docker-entrypoint-initdb.d/02-pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U letese_user"]
      interval: 10s
      timeout: 5s

  # pgbouncer: skipped for local dev — direct postgres connection used

  # ── Cache / Message Broker ──────────────────────────────────────
  # redis: skipped — using host Redis on 127.0.0.1:6379

  # ── Kafka ───────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports: ["2181:2181"]

  kafka-1:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports: ["8080:8080"]
    environment:
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:9092

  # ── API Server ──────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql+asyncpg://letese_user:letese_pass@postgres:5432/letese_prod
      REDIS_URL: redis://127.0.0.1:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092
      DEBUG: "true"
    depends_on: [postgres, kafka-1]
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── AIPOT Agents ────────────────────────────────────────────────
  aipot-scraper:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092
      REDIS_URL: redis://127.0.0.1:6379/0
    depends_on: [kafka-1]
    volumes:
      - ./backend:/app
    command: python -m app.aipots.scraper

  aipot-police:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092
      REDIS_URL: redis://127.0.0.1:6379/0
    depends_on: [kafka-1]
    volumes:
      - ./backend:/app
    command: python -m app.aipots.police
    deploy:
      replicas: 2

volumes:
  postgres_data:
