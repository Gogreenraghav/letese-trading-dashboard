apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: letese-all
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          - git:
              repoURL: https://github.com/YOUR_ORG/letese.git
              revision: HEAD
              directories:
                - path: infrastructure/k8s/*
          - clusters:
              selector:
                matchLabels:
                  environment: production
  template:
    metadata:
      name: 'letese-{{path.basename}}'
    spec:
      project: letese
      source:
        repoURL: https://github.com/YOUR_ORG/letese.git
        targetRevision: HEAD
        path: '{{path}}'
      destination:
        server: '{{server}}'
        namespace: letese
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
