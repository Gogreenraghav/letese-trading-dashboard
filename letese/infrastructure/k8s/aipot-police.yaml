apiVersion: apps/v1
kind: Deployment
metadata:
  name: aipot-police
  namespace: letese
  labels:
    app: aipot-police
    tier: aipot
    agent: letese
    critical: "true"   # Always-on — NEVER scale to zero
spec:
  # 2 replicas: 24/7 always-on — no HPA, no scale-to-zero
  replicas: 2
  selector:
    matchLabels:
      app: aipot-police
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Zero downtime — critical service
  template:
    metadata:
      labels:
        app: aipot-police
        tier: aipot
        agent: letese
        critical: "true"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: letese-aipot-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      # Critical pod scheduling — prefer dedicated nodes
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: aipot-police
      containers:
        - name: police
          image: ghcr.io/letese/letese-aipot:latest
          imagePullPolicy: Always
          command: ["python", "-m", "app.aipots.police"]
          ports:
            - containerPort: 9090
              name: metrics
          envFrom:
            - secretRef:
                name: letese-secrets
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: letese-secrets
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: letese-secrets
                  key: REDIS_URL
            - name: PAGERDUTY_ROUTING_KEY
              valueFrom:
                secretKeyRef:
                  name: letese-secrets
                  key: PAGERDUTY_ROUTING_KEY
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            exec:
              command: ["python", "-c", "import time; time.sleep(0)"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["python", "-c", "import time; time.sleep(0)"]
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 2
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
      # Ensure replicas spread across nodes
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - aipot-police
              topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: aipot-police-svc
  namespace: letese
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
      name: metrics
  selector:
    app: aipot-police

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: aipot-police-pdb
  namespace: letese
spec:
  # Both replicas are critical — at most 1 can be down at a time
  maxUnavailable: 1
  selector:
    matchLabels:
      app: aipot-police
