apiVersion: apps/v1
kind: Deployment
metadata:
  name: aipot-communicator
  namespace: letese
  labels:
    app: aipot-communicator
    tier: aipot
    agent: letese
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aipot-communicator
  template:
    metadata:
      labels:
        app: aipot-communicator
        tier: aipot
        agent: letese
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: letese-aipot-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: communicator
          image: ghcr.io/letese/letese-aipot:latest
          imagePullPolicy: Always
          command: ["python", "-m", "app.aipots.compliance"]
          ports:
            - containerPort: 9090
              name: metrics
          envFrom:
            - secretRef:
                name: letese-secrets
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: letese-secrets
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: letese-secrets
                  key: REDIS_URL
            - name: WHATSAPP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: letese-secrets
                  key: WHATSAPP_API_KEY
            - name: MSG91_AUTH_KEY
              valueFrom:
                secretKeyRef:
                  name: letese-secrets
                  key: MSG91_AUTH_KEY
            - name: EXOTEL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: letese-secrets
                  key: EXOTEL_API_KEY
            - name: EXOTEL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: letese-secrets
                  key: EXOTEL_API_TOKEN
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]

---
apiVersion: v1
kind: Service
metadata:
  name: aipot-communicator-svc
  namespace: letese
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
      name: metrics
  selector:
    app: aipot-communicator

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aipot-communicator-hpa
  namespace: letese
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aipot-communicator
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
    # Kafka lag-based scaling (requires KEDA Kafka scaler)
    # Uncomment when KEDA is installed:
    # - type: External
    #   external:
    #     metric:
    #       name: kafka_consumer_lag
    #       selector:
    #         matchLabels:
    #           topic: letese.communications.dispatch
    #     target:
    #       type: AverageValue
    #       averageValue: "100"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: aipot-communicator-pdb
  namespace: letese
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: aipot-communicator
