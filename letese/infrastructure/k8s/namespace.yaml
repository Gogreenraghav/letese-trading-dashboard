apiVersion: v1
kind: Namespace
metadata:
  name: letese
  labels:
    app.kubernetes.io/name: letese
    app.kubernetes.io/managed-by: kubectl
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: letese-quota
  namespace: letese
spec:
  hard:
    requests.cpu: "8"
    requests.memory: "16Gi"
    limits.cpu: "16"
    limits.memory: "32Gi"
    pods: "40"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: letese-limits
  namespace: letese
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "4"
        memory: "4Gi"
      min:
        cpu: 50m
        memory: 64Mi
