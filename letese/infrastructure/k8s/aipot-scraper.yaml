apiVersion: apps/v1
kind: Deployment
metadata:
  name: aipot-scraper
  namespace: letese
  labels:
    app: aipot-scraper
    tier: aipot
    agent: letese
spec:
  # Scale to zero: replicas=0 managed by KEDA or HPA
  # Default to 1 for initial deploy; KEDA CronScaler controls scale-to-zero
  replicas: 1
  selector:
    matchLabels:
      app: aipot-scraper
  template:
    metadata:
      labels:
        app: aipot-scraper
        tier: aipot
        agent: letese
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: letese-aipot-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: scraper
          image: ghcr.io/letese/letese-aipot:latest
          imagePullPolicy: Always
          command: ["python", "-m", "app.aipots.scraper"]
          ports:
            - containerPort: 9090
              name: metrics
          envFrom:
            - secretRef:
                name: letese-secrets
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: letese-secrets
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: letese-secrets
                  key: REDIS_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
      # Tolerate spot/preemptible nodes for cost savings
      tolerations:
        - key: "node.kubernetes.io/not-ready"
          operator: "Exists"
          effect: "NoSchedule"
          tolerationSeconds: 30

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aipot-scraper-hpa
  namespace: letese
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aipot-scraper
  # Scale to zero supported via KEDA
  # Use: kubectl apply -f aipot-scraper-keda.yaml for KEDA CronScaler/ScaledObject
  minReplicas: 0
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600  # 10 min cooldown before scaling to 0
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
