name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - run: ruff check backend/ --select=E,F,I --ignore=E501,F401

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: letese_user
          POSTGRES_PASSWORD: letese_pass
          POSTGRES_DB: letese_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install psutil  # for metrics service

      - name: Python syntax check
        run: |
          find backend -name "*.py" -exec python3 -m py_compile {} \; || exit 1

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql+asyncpg://letese_user:letese_pass@localhost:5432/letese_test
          REDIS_URL: redis://localhost:6379/0
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
        run: pytest backend/tests/ -v --tb=short

  docker-build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: docker build -t ghcr.io/letese/api:latest -f backend/Dockerfile backend/

      - name: Build AIPOT image
        run: docker build -t ghcr.io/letese/aipot:latest -f backend/Dockerfile.aipot backend/

      - name: Run API container smoke test
        run: |
          docker run -d --name api_test ghcr.io/letese/api:latest
          sleep 5
          docker exec api_test python3 -c "from app.main import app; print('FastAPI app imported OK')"
          docker stop api_test
          docker rm api_test

  docker-build-push:
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push API image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/api:latest backend/
          docker push ghcr.io/${{ github.repository }}/api:latest
      - name: Push AIPOT image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/aipot:latest -f backend/Dockerfile.aipot backend/
          docker push ghcr.io/${{ github.repository }}/aipot:latest
