name: CI/CD

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── LINT ─────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python lint
        run: |
          pip install ruff flake8
          ruff check backend/ --select=E,F,W --ignore=E501 || true

      - name: Flutter analyze
        run: |
          curl -fsSL https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.22.0-stable.tar.xz | tar xJ
          export PATH="$PATH:$HOME/flutter/bin"
          cd frontend/flutter_app && flutter analyze || echo "Flutter analyze skipped"

  # ── TESTS ─────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: letese_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-retries 5
          --health-timeout 5s
          --health-start-period 10s
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest pytest-asyncio pytest-cov httpx

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:test@localhost:5432/letese_test
          REDIS_URL: redis://localhost:6379/0
        run: pytest backend/tests/ -v --cov=backend/app --cov-report=xml --cov-fail-under=50

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml

  # ── DOCKER BUILD ──────────────────────────────────────────────────
  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/api
          tags: type=sha,prefix=,suffix=,format=short

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push AIPOT
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile.aipot
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/aipot:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/aipot:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test API container
        if: github.ref == 'refs/heads/main'
        run: |
          docker run -d --name api_smoke_test \
            -e DATABASE_URL="${DATABASE_URL}" \
            -e REDIS_URL="${REDIS_URL}" \
            -p 8000:8000 \
            --restart unless-stopped \
            ${{ env.REGISTRY }}/${{ github.repository }}/api:$(git rev-parse --short HEAD)
          sleep 8
          docker exec api_smoke_test python3 -c "from app.main import app; print('FastAPI app imported OK')" || \
            { docker logs api_smoke_test; docker stop api_smoke_test; exit 1; }
          docker stop api_smoke_test
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:test@localhost:5432/letese_test
          REDIS_URL: redis://localhost:6379/0
