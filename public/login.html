<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ZummpTrade</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --surface2: #1c2128;
      --border: #30363d; --primary: #58a6ff; --primary-hover: #79b8ff;
      --accent-green: #3fb950; --accent-red: #f85149;
      --text: #e6edf3; --text-muted: #8b949e; --shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    [data-theme="light"] {
      --bg: #f8fafc; --surface: #ffffff; --surface2: #f1f5f9;
      --border: #e2e8f0; --primary: #1d4ed8; --primary-hover: #2563eb;
      --accent-green: #16a34a; --accent-red: #dc2626;
      --text: #0f172a; --text-muted: #64748b; --shadow: 0 8px 32px rgba(0,0,0,0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.3s, color 0.3s;
    }
    .theme-toggle {
      position: fixed; top: 20px; right: 20px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; cursor: pointer;
      font-size: 1.1rem; color: var(--text); transition: all 0.2s;
    }
    .theme-toggle:hover { background: var(--surface2); transform: scale(1.05); }
    .login-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px; width: 440px; max-width: 95vw;
      box-shadow: var(--shadow);
    }
    .logo { font-size: 1.5rem; font-weight: 800; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
    .logo span { color: var(--primary); }
    .subtitle { color: var(--text-muted); font-size: 0.88rem; margin-bottom: 28px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.82rem; font-weight: 600; margin-bottom: 8px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .form-group input {
      width: 100%; padding: 12px 14px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 0.95rem;
      font-family: inherit; transition: border-color 0.2s; outline: none;
    }
    .form-group input:focus { border-color: var(--primary); }
    .btn {
      width: 100%; padding: 13px; border-radius: 8px; font-weight: 700;
      font-size: 0.95rem; cursor: pointer; border: none;
      transition: all 0.2s; font-family: inherit; margin-top: 8px;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .divider { height: 1px; background: var(--border); margin: 24px 0; position: relative; text-align: center; }
    .divider-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); background: var(--surface); padding: 0 12px; font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
    .link { text-align: center; color: var(--text-muted); font-size: 0.88rem; margin-top: 8px; }
    .link a { color: var(--primary); font-weight: 600; }
    .link a:hover { text-decoration: underline; }
    .alert { padding: 12px 14px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 16px; display: none; }
    .alert.error { background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3); color: var(--accent-red); }
    .alert.success { background: rgba(63,185,80,0.1); border: 1px solid rgba(63,185,80,0.3); color: var(--accent-green); }
    .back-home { position: fixed; top: 20px; left: 20px; display: flex; align-items: center; gap: 6px; color: var(--text-muted); text-decoration: none; font-size: 0.85rem; font-weight: 600; transition: color 0.2s; }
    .back-home:hover { color: var(--primary); }
    /* Social login */
    .social-login { display: flex; flex-direction: column; gap: 10px; }
    .btn-social {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 12px; border-radius: 8px;
      font-weight: 600; font-size: 0.9rem; cursor: pointer;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--text); font-family: inherit; transition: all 0.2s;
      text-decoration: none;
    }
    .btn-social:hover { border-color: var(--primary); transform: translateY(-1px); }
    .btn-social img { width: 20px; height: 20px; }
    .btn-google { }
    .btn-microsoft { }
    .btn-facebook { }
    .or-divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
    .or-divider::before, .or-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .or-divider span { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
    .form-section-title { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; text-align: center; }
  </style>
</head>
<body>
  <a href="/" class="back-home">← Back to Home</a>
  <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">🌙</button>
  <div class="login-card">
    <div class="logo">Zummp<span>Trade</span> ⚡</div>
    <p class="subtitle">Sign in to your trading account</p>
    <div class="alert" id="alert"></div>

    <!-- Social Login -->
    <div class="social-login">
      <a href="/api/auth/google" class="btn-social btn-google" onclick="event.preventDefault(); showAlert('Google login coming soon!','info')">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </a>
      <a href="/api/auth/microsoft" class="btn-social btn-microsoft" onclick="event.preventDefault(); showAlert('Microsoft login coming soon!','info')">
        <svg width="20" height="20" viewBox="0 0 24 24"><rect x="1" y="1" width="10" height="10" fill="#f25022"/><rect x="13" y="1" width="10" height="10" fill="#00a4ef"/><rect x="1" y="13" width="10" height="10" fill="#7fba00"/><rect x="13" y="13" width="10" height="10" fill="#ffb900"/></svg>
        Continue with Microsoft
      </a>
      <a href="/api/auth/facebook" class="btn-social btn-facebook" onclick="event.preventDefault(); showAlert('Facebook login coming soon!','info')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        Continue with Facebook
      </a>
    </div>

    <div class="or-divider"><span>or</span></div>

    <!-- Email Login -->
    <form id="loginForm">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">Sign In →</button>
    </form>
    <p class="link">Don't have an account? <a href="/register">Create one free</a></p>
  </div>

  <script>
    function showAlert(msg, type) {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = 'alert ' + (type === 'error' ? 'error' : 'success');
      el.style.display = 'block';
    }
    function toggleTheme() {
      const html = document.documentElement;
      const btn = document.getElementById('themeToggle');
      if (html.getAttribute('data-theme') === 'light') {
        html.removeAttribute('data-theme');
        btn.textContent = '🌙';
        localStorage.setItem('theme', 'dark');
      } else {
        html.setAttribute('data-theme', 'light');
        btn.textContent = '☀️';
        localStorage.setItem('theme', 'light');
      }
    }
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
        document.getElementById('themeToggle').textContent = '☀️';
      }
    })();
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const alert_el = document.getElementById('alert');
      const fd = new FormData(e.target);
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      alert_el.style.display = 'none';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: fd.get('email'), password: fd.get('password') })
        });
        const data = await res.json();
        if (res.ok && data.token) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user || {}));
          showAlert('✅ Login successful! Redirecting...', 'success');
          setTimeout(() => {
            if (data.user && data.user.role === 'admin') {
              const next = new URLSearchParams(window.location.search).get('next'); if(next) { window.location.href = next; } else { const nextAdm = new URLSearchParams(window.location.search).get('next'); window.location.href = nextAdm || '/admin.html'; }
            } else {
              const nextDash = new URLSearchParams(window.location.search).get('next'); window.location.href = nextDash || '/dashboard.html';
            }
          }, 800);
        } else {
          showAlert('❌ ' + (data.error || 'Invalid email or password'), 'error');
          btn.disabled = false;
          btn.textContent = 'Sign In →';
        }
      } catch(err) {
        showAlert('❌ Network error. Please try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Sign In →';
      }
    });
  </script>
</body>
</html>
