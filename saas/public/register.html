<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LETESE Trading — Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{colors:{accent:{'green':'#22c55e','red':'#ef4444','blue':'#3b82f6','amber':'#f59e0b','purple':'#8b5cf6'}}}}}</script>
  <style>
    *{box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#0a0e1a;color:#e2e8f0;min-height:100vh;margin:0}
    .text-mono{font-family:'JetBrains Mono',monospace}
    @keyframes spin-slow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}.spin-slow{animation:spin-slow 2s linear infinite}
    @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}.fade-in{animation:fadeIn 0.5s ease-out forwards}
    .glass-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px}
    .input-field{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#e2e8f0;font-size:14px;padding:11px 14px;width:100%;transition:border 0.2s,box-shadow 0.2s}
    .input-field:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,0.15)}
    .input-field::placeholder{color:#475569}
    .btn-primary{background:#3b82f6;color:white;border:none;border-radius:10px;padding:13px 24px;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;width:100%}
    .btn-primary:hover{background:#2563eb;transform:translateY(-1px);box-shadow:0 4px 16px rgba(59,130,246,0.3)}
    .btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none}
    .plan-card{background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px;cursor:pointer;transition:all 0.2s}
    .plan-card:hover{border-color:rgba(59,130,246,0.4)}
    .plan-card.selected{border-color:#3b82f6;background:rgba(59,130,246,0.08)}
  </style>
</head>
<body>
  <div class="min-h-screen p-4" style="background:radial-gradient(ellipse at 30% 20%, rgba(59,130,246,0.06) 0%, transparent 50%), radial-gradient(ellipse at 70% 80%, rgba(34,197,94,0.05) 0%, transparent 50%);">
    <div class="fade-in max-w-2xl mx-auto">
      <!-- Header -->
      <div class="text-center mb-6">
        <div class="inline-flex items-center gap-0.5 mb-3">
          <div class="w-9 h-9 rounded-xl bg-red-600 flex items-center justify-center font-bold text-white">L</div>
          <div class="w-9 h-9 rounded-xl bg-yellow-500 flex items-center justify-center font-bold text-black">E</div>
        </div>
        <h1 class="text-white font-bold text-2xl">Create Account</h1>
        <p class="text-slate-400 text-sm">Start your automated trading journey</p>
      </div>

      <div id="errorMsg" class="hidden bg-red-500/15 border border-red-500/30 text-red-400 text-sm rounded-lg p-3 mb-4"></div>
      <div id="successMsg" class="hidden bg-green-500/15 border border-green-500/30 text-green-400 text-sm rounded-lg p-3 mb-4"></div>

      <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="glass-card p-6 mb-4">
          <h3 class="text-white font-semibold text-sm mb-4 flex items-center gap-2">👤 Personal Information</h3>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label class="block text-slate-300 text-xs font-medium mb-1">Full Name *</label>
              <input type="text" id="name" class="input-field" placeholder="Arjun Singh" required />
            </div>
            <div>
              <label class="block text-slate-300 text-xs font-medium mb-1">Phone *</label>
              <input type="tel" id="phone" class="input-field" placeholder="+91 98765 43210" required />
            </div>
            <div class="sm:col-span-2">
              <label class="block text-slate-300 text-xs font-medium mb-1">Email *</label>
              <input type="email" id="email" class="input-field" placeholder="you@example.com" required />
            </div>
            <div>
              <label class="block text-slate-300 text-xs font-medium mb-1">Password *</label>
              <input type="password" id="password" class="input-field" placeholder="Min 6 characters" required minlength="6" />
            </div>
            <div>
              <label class="block text-slate-300 text-xs font-medium mb-1">Confirm Password *</label>
              <input type="password" id="confirmPassword" class="input-field" placeholder="Repeat password" required />
            </div>
          </div>
        </div>

        <!-- Plan Selection -->
        <div class="glass-card p-6 mb-4">
          <h3 class="text-white font-semibold text-sm mb-4 flex items-center gap-2">💳 Choose Your Plan</h3>
          <div id="plansGrid" class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-3">
            <div class="text-slate-400 text-xs text-center py-4">Loading plans...</div>
          </div>
          <input type="hidden" id="selectedPlan" value="basic" />
        </div>

        <!-- Terms -->
        <div class="mb-4">
          <label class="flex items-start gap-2 cursor-pointer">
            <input type="checkbox" required class="accent-blue-500 mt-0.5" style="width:14px;height:14px;" />
            <span class="text-slate-400 text-xs">I agree to the <a href="#" class="text-blue-400 hover:underline">Terms of Service</a> and <a href="#" class="text-blue-400 hover:underline">Privacy Policy</a></span>
          </label>
        </div>

        <button type="submit" id="regBtn" class="btn-primary mb-4 flex items-center justify-center gap-2">
          <span>Create Account</span>
        </button>

        <p class="text-center text-slate-500 text-sm">Already have an account? <a href="/login" class="text-blue-400 hover:underline">Sign in</a></p>
      </form>
    </div>
  </div>

  <script>
    let plans = [];

    async function loadPlans() {
      try {
        const res = await fetch('/api/plans');
        const data = await res.json();
        plans = data.plans || [];
        renderPlans('basic');
      } catch(e) {
        plans = [
          { id: 'basic', name: 'Basic', price: 999, features: ['30 cases/month', 'Basic dashboard'] },
          { id: 'professional', name: 'Professional', price: 2499, features: ['100 cases/month', 'Full dashboard', 'Telegram alerts'] },
          { id: 'elite', name: 'Elite', price: 4999, features: ['Unlimited', 'AI + All features'] },
        ];
        renderPlans('basic');
      }
    }

    function renderPlans(selected) {
      const grid = document.getElementById('plansGrid');
      grid.innerHTML = plans.map(p => `
        <div class="plan-card ${p.id === selected ? 'selected' : ''}" onclick="selectPlan('${p.id}')" id="plan-${p.id}">
          <div class="text-blue-400 font-bold text-sm mb-1">${p.name}</div>
          <div class="text-white font-bold text-xl mb-2">₹${p.price}<span class="text-slate-500 text-xs font-normal">/mo</span></div>
          <ul class="space-y-1">
            ${(p.features || []).slice(0, 3).map(f => `<li class="text-slate-400 text-[10px] flex items-center gap-1"><span class="text-green-400">✓</span> ${f}</li>`).join('')}
          </ul>
        </div>
      `).join('');
    }

    function selectPlan(id) {
      document.getElementById('selectedPlan').value = id;
      document.querySelectorAll('.plan-card').forEach(el => el.classList.remove('selected'));
      const el = document.getElementById('plan-' + id);
      if (el) el.classList.add('selected');
    }

    async function handleRegister(e) {
      e.preventDefault();
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      const btn = document.getElementById('regBtn');
      errorMsg.classList.add('hidden');
      successMsg.classList.add('hidden');

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;
      const plan = document.getElementById('selectedPlan').value;

      if (password !== confirm) {
        errorMsg.textContent = 'Passwords do not match';
        errorMsg.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full spin-slow"></div><span>Creating account...</span>';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, phone, password, plan }),
        });
        const data = await res.json();

        if (!res.ok) {
          errorMsg.textContent = data.error || 'Registration failed';
          errorMsg.classList.remove('hidden');
          btn.disabled = false;
          btn.innerHTML = '<span>Create Account</span>';
          return;
        }

        successMsg.textContent = '✅ Account created! Redirecting to dashboard...';
        successMsg.classList.remove('hidden');
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        
        setTimeout(() => { window.location.href = '/customer'; }, 1500);
      } catch (err) {
        errorMsg.textContent = 'Server error. Please try again.';
        errorMsg.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = '<span>Create Account</span>';
      }
    }

    loadPlans();
  </script>
</body>
</html>
