<body class="font-body bg-background text-on-surface min-h-screen flex items-center justify-center p-0 m-0 overflow-x-hidden">
<!-- Main Canvas: Mobile Container -->
<div class="relative w-full max-w-[430px] h-[932px] overflow-hidden shadow-2xl flex flex-col bg-gradient-to-b from-primary-fixed to-primary">

<div class="absolute bottom-[-5%] left-[-5%] w-[400px] h-[400px] bg-primary-container/30 rounded-full blur-[100px]"></div>

<header class="fixed top-0 w-full z-50 bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl flex justify-between items-center px-6 py-4 max-w-full shadow-[0_8px_32px_0_rgba(43,81,199,0.08)]">
<div class="text-2xl font-black text-slate-900 dark:text-white flex items-center gap-1 font-headline font-bold text-lg tracking-tight">
<span class="material-symbols-outlined text-blue-600 dark:text-blue-400">gavel</span>
<span>LETESE</span>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-slate-500 dark:text-slate-400 hover:opacity-80 transition-opacity cursor-pointer">notifications</span>
</div>
</header>
<!-- Content Area -->
<main class="flex-1 flex flex-col items-center justify-start pt-32 px-8 z-10">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-12">
<div class="relative mb-2">
<h1 class="text-5xl font-black text-primary tracking-tighter font-headline flex flex-col items-center">
                        LETESE
                        <span class="block w-3 h-3 bg-tertiary-fixed rounded-full mt-1 shadow-[0_0_15px_#52f9a8]"></span>
</h1>
</div>
<h2 class="text-white font-headline font-extrabold text-2xl tracking-tight mt-4 uppercase">Advocate Suite</h2>
<p class="text-white/90 font-medium text-lg mt-1">वकीलों के लिए AI</p>
</div>
<!-- Login Form -->
<div class="w-full space-y-5">
<!-- Email Input -->
<div class="relative">
<label class="block text-white/80 text-xs font-bold uppercase tracking-widest mb-2 px-1">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary">mail</span>
<input class="w-full bg-surface-container-lowest border-2 border-primary-fixed/30 rounded-full py-4 pl-12 pr-6 text-on-surface focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all placeholder:text-outline-variant" placeholder="advocate@letese.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="relative">
<label class="block text-white/80 text-xs font-bold uppercase tracking-widest mb-2 px-1">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary">lock</span>
<input class="w-full bg-surface-container-lowest border-2 border-primary-fixed/30 rounded-full py-4 pl-12 pr-6 text-on-surface focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all placeholder:text-outline-variant" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Login Button -->
<button class="w-full bg-primary hover:bg-primary-dim text-on-primary font-headline font-bold py-5 rounded-full shadow-[0_8px_24px_rgba(43,81,199,0.4)] active:scale-95 transition-all text-lg uppercase tracking-widest mt-4">
                    LOGIN
                </button>
<!-- Social Login -->
<div class="pt-6 flex flex-col items-center">
<p class="text-white font-medium text-sm mb-6">or continue with Google</p>
<button class="flex items-center gap-3 bg-white/10 glass-panel border border-white/20 px-8 py-3 rounded-full text-white font-semibold hover:bg-white/20 transition-colors active:scale-95">
<img alt="Google Logo" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB3woeBcSIj8DFEEofqCcENqoVMmOfQHAn3YU5p8t3KCeVPpYithX6iq14qhrzyeNNWBqDR8TwZwgviLHYGOqJcnaBvjzqTuYFDiuLXmh0dwieLOXuzVVQg4jxYIUxBgOcoBep3d2Mg64t_4CFszZN0ZChPVpTII3VcKfegh9MO5QYQeH7qcA-IdVZZ4jLB6HEIiSYZTGrVVwGbQjn0FfX8eXo05dC8dr0C83X1CU8V7eL15riJaEARpoXVYyqpzzpfiKFYn3vQB3U"/>
                        Google
                    </button>
</div>
<!-- Register -->
<div class="pt-8 text-center">
<button class="text-primary font-headline font-extrabold text-lg px-8 py-3 bg-white rounded-full shadow-lg hover:bg-surface-container-low transition-colors">
                        Register
                    </button>
</div>
</div>

<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 pb-8 bg-white/70 dark:bg-slate-900/70 backdrop-blur-2xl shadow-[0_-4px_24px_0_rgba(43,81,199,0.1)] rounded-t-3xl md:hidden">

<div class="flex items-center justify-center text-slate-400 dark:text-slate-500 p-3 hover:bg-blue-50 dark:hover:bg-blue-900/30 transition-colors active:scale-90 duration-200 ease-out">
<span class="material-symbols-outlined">home</span>
</div>
<div class="flex items-center justify-center text-slate-400 dark:text-slate-500 p-3 hover:bg-blue-50 dark:hover:bg-blue-900/30 transition-colors active:scale-90 duration-200 ease-out">
<span class="material-symbols-outlined">briefcase_meal</span>
</div>
<div class="flex items-center justify-center text-slate-400 dark:text-slate-500 p-3 hover:bg-blue-50 dark:hover:bg-blue-900/30 transition-colors active:scale-90 duration-200 ease-out">

<span class="material-symbols-outlined">chat_bubble</span>
</div>
<!-- Login screen maps to Person/Profile intent -->
<div class="flex items-center justify-center bg-blue-600/10 dark:bg-blue-400/20 text-blue-600 dark:text-blue-400 rounded-2xl p-3 active:scale-90 duration-200 ease-out">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
</div>
</nav>

<div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-white/30 rounded-full"></div>
